<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlphaCoin</title>

   <link rel="icon" href="logoalpha.png">
   <link rel="apple-touch-icon" sizes="180x180" href="logoalpha.png">
    <link rel="stylesheet" href="style.css">
    

    <!-- SEO -->
    <meta name="description" content="ALPHA is a Solana ecosystem focused on community, utility and long-term growth.">
    <meta name="keywords" content="ALPHA, Solana, Crypto, Token, Blockchain">
    <meta name="author" content="ALPHA Team">

    <!-- Open Graph -->
    <meta property="og:title" content="ALPHA">
    <meta property="og:description" content="Built on Solana. Designed for the future.">
    <meta property="og:image" content="logoalpha.png">
    <meta property="og:type" content="website">

    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700;800&display=swap" rel="stylesheet">
</head>

<body>

<header class="nav">

    <a href="index.html" class="logo">
        <img src="logoalpha.png" alt="ALPHA">
        <span>ALPHA</span>
    </a>

    <div class="nav-actions">

        <button class="wallet-btn" id="connectWallet">

            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">

                <path d="M3 7.5A2.5 2.5 0 015.5 5h13A2.5 2.5 0 0121 7.5v9A2.5 2.5 0 0118.5 19h-13A2.5 2.5 0 013 16.5v-9z"
                stroke="currentColor"
                stroke-width="2"/>

                <circle
                cx="17"
                cy="12"
                r="1.5"
                fill="currentColor"/>

            </svg>

            <span>Connect Wallet</span>

        </button>

        <button class="menu-btn" id="menuBtn">

            <span></span>
            <span></span>
            <span></span>

        </button>

    </div>

</header>

<div class="menu-overlay" id="menuOverlay"></div>

<aside class="side-menu" id="sideMenu">

    <div class="side-header">

        <img src="logoalpha.png">

        <h2>ALPHA</h2>

    </div>

    <nav class="side-links">

        <a href="#">Home</a>

        <a href="#">About</a>

        <a href="#">Tokenomics</a>

        <a href="#">Roadmap</a>

        <a href="#">Docs</a>

    </nav>

</aside>
<main>
</main>

<section class="wallet-dashboard">

    <div class="countdown">

        <h2>Launch In</h2>

        <div id="timer">

            <span id="days">00</span>d :

            <span id="hours">00</span>h :

            <span id="minutes">00</span>m :

            <span id="seconds">00</span>s

        </div>

    </div>

    <div class="wallet-card">

    <p id="walletInfo">

        Wallet not connected

    </p>

</div>

<div class="trade-buttons">

    <button class="trade-btn buy">

        Buy

    </button>

    <button class="trade-btn sell">

        Sell

    </button>

</div>

<div class="swap-card">

    <h3>Swap</h3>

    <div class="swap-box">

        <label>From</label>

        <input
        type="number"
        placeholder="0.00">

    </div>

    <button class="swap-arrow">

        ⇅

    </button>

    <div class="swap-box">

        <label>To</label>

        <input
        type="number"
        placeholder="0.00"
        readonly>

    </div>

    <button class="swap-btn">

        Swap

    </button>

</div>

</section>
